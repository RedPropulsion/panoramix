# Debug
CONFIG_DEBUG=y
CONFIG_FAULT_DUMP=2
CONFIG_EXTRA_EXCEPTION_INFO=y
CONFIG_CPU_LOAD=y
CONFIG_EARLY_CONSOLE=y
CONFIG_BOOT_BANNER=y
CONFIG_CLOCK_CONTROL_LOG_LEVEL_DBG=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_TRACING=y

CONFIG_STACK_SENTINEL=y
CONFIG_STACK_CANARIES=y

# CONFIG_THREAD_ANALYZER=y
# CONFIG_THREAD_ANALYZER_AUTO=y
# CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=5
# CONFIG_THREAD_ANALYZER_USE_LOG=y


CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096

# CONFIG_THREAD_RUNTIME_STATS=y
# CONFIG_WORKQUEUE_WORK_TIMEOUT=y





# Interfaces
CONFIG_GPIO=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_PRINTK=y
CONFIG_EVENTS=y



#DMA
CONFIG_DMA=y
CONFIG_DCACHE=n
CONFIG_DMA_STM32=y
CONFIG_SPI_STM32_DMA=y


# I2C
CONFIG_I2C_STM32=y
CONFIG_I2C_STM32_V2_DMA=y

# PWM
CONFIG_PWM=y
CONFIG_PWM_STM32=y

## Sensor API
CONFIG_SENSOR_ASYNC_API=y

# LED strip support
CONFIG_LED_STRIP=y
CONFIG_WS2812_GPIO_STM32=y

# LoRa
CONFIG_LORA=y
CONFIG_LORA_INIT_PRIORITY=90
CONFIG_LORA_SX126X=y

# SD card support
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LIB_LINK=y
CONFIG_DISK_ACCESS=y
CONFIG_SDMMC_STM32_CLOCK_CHECK=n
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_SDMMC_STM32=y
CONFIG_FAT_FILESYSTEM_ELM=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_ZVFS_POLL_MAX=10

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.1.100"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.1.101"

# UDP Client
CONFIG_UDP_CLIENT=y

# Display module
CONFIG_LIB_DISPLAY=y


# GNSS (M10)
CONFIG_GNSS=y
CONFIG_GNSS_U_BLOX_M10=y
# CONFIG_GNSS_LOG_LEVEL_WRN=y


# OLED display
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_SSD1306_DEFAULT_CONTRAST=128
#Max brightness. Adjust as needed.

## Character framebuffer for display
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y